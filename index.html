    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f4f5;
        border-left: 2px solid #27272a;
      }
      .dark ::-webkit-scrollbar-track {
        background: #18181b;
        border-left: 2px solid #3f3f46;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border: 1px solid #18181b;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #fbbd23;
      }

      /* ==================== Space Diary 主题样式 ==================== */

      /* 星空背景 */
      .space-bg {
        background: linear-gradient(180deg, #0a0a0f 0%, #12121a 50%, #1a1a24 100%);
        position: relative;
        overflow: hidden;
      }

      .space-bg::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
          radial-gradient(2px 2px at 60px 70px, rgba(255,255,255,0.2), transparent),
          radial-gradient(1px 1px at 50px 50px, rgba(255,255,255,0.4), transparent),
          radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.2), transparent),
          radial-gradient(2px 2px at 90px 10px, rgba(255,255,255,0.3), transparent);
        background-size: 200px 200px;
        animation: starTwinkle 10s ease-in-out infinite;
        pointer-events: none;
      }

      /* 扫描线效果（用于记忆碎片弹窗） */
      .scanlines {
        position: relative;
        overflow: hidden;
      }

      .scanlines::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.15),
          rgba(0, 0, 0, 0.15) 1px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
      }

      /* 全息投影效果 */
      .hologram {
        position: relative;
        background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(34, 211, 238, 0.1) 100%);
        border: 1px solid rgba(251, 191, 36, 0.3);
        box-shadow:
          0 0 20px rgba(251, 191, 36, 0.2),
          inset 0 0 20px rgba(251, 191, 36, 0.1);
        backdrop-filter: blur(10px);
      }

      .hologram::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(251, 191, 36, 0.2),
          transparent
        );
        animation: hologramScan 3s linear infinite;
        pointer-events: none;
      }

      @keyframes hologramScan {
        0% { left: -100%; }
        100% { left: 200%; }
      }

      /* 锈迹效果 */
      .rust-overlay {
        position: relative;
      }

      .rust-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(168, 118, 62, 0.3) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(168, 118, 62, 0.2) 0%, transparent 50%);
        pointer-events: none;
      }

      /* 打字机效果光标 */
      .typing-cursor::after {
        content: '|';
        animation: cursorBlink 1s step-end infinite;
      }

      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* 发光文字 */
      .glow-text {
        text-shadow:
          0 0 10px rgba(251, 191, 36, 0.8),
          0 0 20px rgba(251, 191, 36, 0.5),
          0 0 30px rgba(251, 191, 36, 0.3);
      }

      /* 进度条发光效果 */
      .progress-segment-active {
        box-shadow:
          0 0 10px currentColor,
          0 0 20px currentColor;
        animation: glowPulse 2s ease-in-out infinite;
      }

      /* 机器人破损效果 */
      .robot-damaged {
        position: relative;
      }

      .robot-damaged::after {
        content: '';
        position: absolute;
        top: 10%;
        left: 20%;
        width: 30%;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(168, 118, 62, 0.8), transparent);
        transform: rotate(-15deg);
      }

      /* 纸张纹理效果 */
      .paper-texture {
        background-color: #1a1a24;
        background-image:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
      }

      /* ==================== CSS 3D 效果 ==================== */

      /* 3D透视容器 */
      .perspective-1000 {
        perspective: 1000px;
      }

      .perspective-2000 {
        perspective: 2000px;
      }

      /* 3D卡片翻转效果 */
      .card-3d {
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card-3d:hover {
        transform: rotateY(5deg) rotateX(5deg) translateZ(20px);
      }

      /* 3D翻转进入动画 */
      .flip-in {
        animation: flipIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes flipIn {
        0% {
          transform: rotateY(-90deg) scale(0.8);
          opacity: 0;
        }
        100% {
          transform: rotateY(0deg) scale(1);
          opacity: 1;
        }
      }

      /* 3D浮动效果 */
      .float-3d {
        transform-style: preserve-3d;
        animation: float3D 6s ease-in-out infinite;
      }

      @keyframes float3D {
        0%, 100% {
          transform: translateY(0) rotateX(0deg) rotateY(0deg);
        }
        25% {
          transform: translateY(-8px) rotateX(2deg) rotateY(-2deg);
        }
        50% {
          transform: translateY(-15px) rotateX(0deg) rotateY(0deg);
        }
        75% {
          transform: translateY(-8px) rotateX(-2deg) rotateY(2deg);
        }
      }

      /* 3D深度阴影 */
      .depth-shadow {
        box-shadow:
          0 1px 1px rgba(0, 0, 0, 0.08),
          0 2px 2px rgba(0, 0, 0, 0.08),
          0 4px 4px rgba(0, 0, 0, 0.08),
          0 8px 8px rgba(0, 0, 0, 0.08),
          0 16px 16px rgba(0, 0, 0, 0.08),
          0 32px 32px rgba(0, 0, 0, 0.08);
      }

      /* 3D按钮按压效果 */
      .btn-3d {
        transform-style: preserve-3d;
        transition: all 0.15s ease;
        box-shadow:
          0 4px 0 0 rgba(0, 0, 0, 0.3),
          0 8px 16px rgba(0, 0, 0, 0.3);
      }

      .btn-3d:hover {
        transform: translateY(-2px);
        box-shadow:
          0 6px 0 0 rgba(0, 0, 0, 0.3),
          0 12px 20px rgba(0, 0, 0, 0.4);
      }

      .btn-3d:active {
        transform: translateY(4px);
        box-shadow:
          0 0 0 0 rgba(0, 0, 0, 0.3),
          0 4px 8px rgba(0, 0, 0, 0.3);
      }

      /* 按钮发光效果 */
      .btn-glow {
        position: relative;
        overflow: hidden;
      }

      .btn-glow::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(251, 191, 36, 0.3) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .btn-glow:hover::before {
        opacity: 1;
      }

      /* 按钮加载状态 */
      .btn-loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .btn-loading::after {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        border: 2px solid transparent;
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* 按钮禁用状态增强 */
      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
        transform: none !important;
        box-shadow: none !important;
      }

      button:disabled:hover {
        transform: none !important;
      }

      /* 3D进度管道 */
      .progress-pipe {
        transform-style: preserve-3d;
        perspective: 500px;
      }

      .progress-segment {
        transform-style: preserve-3d;
        transition: all 0.3s ease;
      }

      .progress-segment-active {
        transform: translateZ(4px);
        box-shadow:
          0 0 10px currentColor,
          0 4px 8px rgba(0, 0, 0, 0.3);
      }

      /* 3D层叠效果 */
      .layered {
        position: relative;
      }

      .layered::before,
      .layered::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: inherit;
        pointer-events: none;
      }

      .layered::before {
        transform: translateZ(-1px);
        background: rgba(0, 0, 0, 0.1);
      }

      .layered::after {
        transform: translateZ(-2px);
        background: rgba(0, 0, 0, 0.05);
      }

      /* 视差效果容器 */
      .parallax-container {
        perspective: 1000px;
        transform-style: preserve-3d;
      }

      .parallax-layer {
        transform-style: preserve-3d;
        transition: transform 0.3s ease-out;
      }

      /* 3D旋转展示 */
      .rotate-showcase {
        animation: rotateShowcase 20s linear infinite;
        transform-style: preserve-3d;
      }

      @keyframes rotateShowcase {
        0% { transform: rotateY(0deg); }
        100% { transform: rotateY(360deg); }
      }

      /* 全息卡片3D效果 */
      .hologram-card {
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .hologram-card:hover {
        transform:
          rotateY(10deg) rotateX(5deg)
          translateZ(30px) scale(1.05);
      }

      /* ==================== 页面过渡动画 ==================== */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-20px);
        }
      }

      .page-enter {
        animation: fadeIn 0.4s ease-out forwards;
      }

      /* 页面进入时的动画 */
      .intro-enter { animation: fadeIn 0.5s ease-out forwards; }
      .daily-enter { animation: fadeIn 0.4s ease-out forwards; }
      .history-enter { animation: fadeIn 0.4s ease-out forwards; }

      /* 进度条动画 */
      @keyframes progress {
        from { width: 0%; }
        to { width: 100%; }
      }

      @keyframes progress2s {
        from { width: 0%; }
        to { width: 100%; }
      }

      /* 问题预览弹窗动画 */
      @keyframes questionPreviewIn {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .question-preview-enter {
        animation: questionPreviewIn 0.5s ease-out forwards;
      }

      /* 记忆碎片解锁闪光动画 */
      @keyframes flash {
        0% { opacity: 0; }
        10% { opacity: 0.8; }
        100% { opacity: 0; }
      }

      /* 解锁时锁的脉冲动画 */
      @keyframes unlockPulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
        50% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(251, 191, 36, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
      }

      /* 解锁时光环扩散动画 */
      @keyframes unlockRing {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
      }

      /* 边框脉冲动画 */
      @keyframes borderPulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.6; }
      }

      /* 粒子爆炸动画 */
      @keyframes particle {
        0% {
          transform: rotate(var(--rotation, 0deg)) translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: rotate(var(--rotation, 0deg)) translateY(-120px) scale(0);
          opacity: 0;
        }
      }

      /* 超级粒子爆炸 - 使用自定义属性 */
      @keyframes particleExplode {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(calc(-50% + var(--tx, 0px)), calc(-50% + var(--ty, 0px))) scale(0);
          opacity: 0;
        }
      }

      /* 光芒放射 */
      @keyframes rayExpand {
        0% {
          transform: translateX(-50%) translateY(-50%) rotate(var(--rotation, 0deg)) scaleY(0);
          opacity: 0.8;
        }
        100% {
          transform: translateX(-50%) translateY(-50%) rotate(var(--rotation, 0deg)) scaleY(3);
          opacity: 0;
        }
      }

      /* 星星闪烁 */
      @keyframes starTwinkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0) rotate(0deg);
        }
        50% {
          opacity: 1;
          transform: scale(1.5) rotate(180deg);
        }
      }

      /* 徽章弹跳动画 */
      @keyframes badgeBounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2) rotate(5deg); }
      }

      /* 徽章滑入动画 */
      @keyframes badgeSlideIn {
        0% {
          transform: translateY(-20px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* 震动效果 */
      .animate-shake {
        animation: shake 0.5s ease-in-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0) scale(1.1); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px) scale(1.1); }
        20%, 40%, 60%, 80% { transform: translateX(5px) scale(1.1); }
      }
    </style>
